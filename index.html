<script>
// ═══════════ CONFIG ═══════════
const CATS = {
  deel:       { label:'Deel関連',     color:'#0052ff' },
  funding:    { label:'資金調達',     color:'#10b981' },
  ma:         { label:'M&A',          color:'#f59e0b' },
  competitor: { label:'競合動向',     color:'#ef4444' },

  hr:         { label:'人事・HR',     color:'#ec4899' },
  event:      { label:'イベント',     color:'#06b6d4' }
};

// Consolidated queries — fewer but broader to reduce API calls
const CAT_Q = {
  deel:       { ja:['Deel 日本'], en:['Deel HR payroll EOR'] },
  funding:    { ja:['スタートアップ 資金調達 億円','ベンチャー シリーズ 調達'], en:['japan startup funding series'] },
  ma:         { ja:['M&A 買収 合併 日本','TOB 公開買付 買収'], en:['japan M&A acquisition merger'] },
  competitor: { ja:['SmartHR OR freee人事労務 OR マネーフォワード給与','KING OF TIME OR ジョブカン OR カオナビ'], en:['Remote OR "Oyster HR" OR "Papaya Global" OR Rippling'] },
  global:     { ja:['海外進出 日本企業','海外事業展開 グローバル展開'], en:['japanese company global expansion overseas'] },
  talent:     { ja:['外国人材 採用 日本','グローバル人材 採用 リモート'], en:['japan hiring global talent international'] },
  hr:         { ja:['HR Tech 日本 人事','CHRO OR 人事部長 インタビュー','EOR 雇用代行 給与計算'], en:['HR technology employer of record japan'] },
  event:      { ja:['HR Tech イベント カンファレンス','人事 EXPO セミナー 2025'], en:['HR tech conference summit japan'] }
};

const ORD = ['deel','funding','ma','competitor','global','talent','hr','event'];

// ═══════════ SALES SCORING ═══════════
const HIGH_KW = [
  '海外進出','海外展開','グローバル展開','海外拠点','海外子会社',
  '海外人材','外国人材','グローバル人材','越境リモート','リモート採用',
  '資金調達','シリーズA','シリーズB','シリーズC','シリーズD','億円調達',
  '人事制度','給与計算','EOR','雇用代行','Employer of Record',
  'M&A','買収','合併','TOB','IPO','上場',
  'Deel','SmartHR','freee','Remote.com','Oyster','Papaya Global','Rippling',
  'global expansion','international hiring','overseas','payroll',
  'HR tech','CHRO','人事部長','働き方改革','リモートワーク'
];
const BOOST = { deel:30, competitor:20, talent:18, global:18, funding:14, ma:12, hr:10, event:5 };
function score(a) {
  let s = BOOST[a.category]||0;
  const t = (a.title+' '+(a.summary||'')+' '+(a.titleOriginal||'')).toLowerCase();
  HIGH_KW.forEach(k => { if (t.includes(k.toLowerCase())) s += 8; });
  const age = (Date.now() - a.pubDate) / 86400000;
  if (age < 3) s += 10; else if (age < 7) s += 5;
  return s;
}

// ═══════════ STATE ═══════════
let ALL = [];
let BM = JSON.parse(localStorage.getItem('dn_bm2')||'[]');
let TAB = 'top';
let currentArticle = null;
let errorLogs = [];
// ═══════════ PROXY WORKER (Cloudflare Workers) ═══════════
// デプロイ後、以下のURLをWorkerのURLに変更する
// 空文字列の場合はWorkerを使わず、既存のCORSプロキシにフォールバック
const WORKER_URL = '';
    const ARTICLES_JSON_URL = 'data/articles.json'; // 例: 'https://deel-news-proxy.xxx.workers.dev'


// ═══════════ MULTI-STRATEGY FETCH ═══════════
// Strategy 1: rss2json.com API (returns JSON, CORS-friendly)
async function fetchViaRss2Json(rssUrl) {
  const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
  const r = await fetch(apiUrl, { signal: AbortSignal.timeout(12000) });
  if (!r.ok) throw new Error(`rss2json: ${r.status}`);
  const data = await r.json();
  if (data.status !== 'ok') throw new Error(`rss2json: ${data.message||'error'}`);
  return data.items.map(it => {
    // Google News RSS: extract actual URL from description's <a href>
    let link = it.link || '';
    if (link.includes('news.google.com')) {
      const descHtml = it.description || it.content || '';
      const hrefMatch = descHtml.match(/<a[^>]+href="(https?:\/\/(?!news\.google\.com)[^"]+)"/i);
      if (hrefMatch) link = hrefMatch[1];
    }
    return {
    title: it.title || '',
    link,
    pubDate: new Date(it.pubDate),
    source: it.author || extractSource(it.title),
    img: it.thumbnail || it.enclosure?.link || extractImg(it.description || it.content || ''),
    summary: stripHtml(it.description || it.content || '')
  }}).filter(a => a.title && a.link);
}

// Strategy 2: allorigins.win JSON endpoint
async function fetchViaAllOrigins(rssUrl) {
  const apiUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;
  const r = await fetch(apiUrl, { signal: AbortSignal.timeout(12000) });
  if (!r.ok) throw new Error(`allorigins: ${r.status}`);
  const data = await r.json();
  if (!data.contents) throw new Error('allorigins: empty');
  return parseXml(data.contents);
}

// Strategy 3: corsproxy.io
async function fetchViaCorsproxy(rssUrl) {
  const apiUrl = `https://corsproxy.io/?${encodeURIComponent(rssUrl)}`;
  const r = await fetch(apiUrl, { signal: AbortSignal.timeout(12000) });
  if (!r.ok) throw new Error(`corsproxy: ${r.status}`);
  return parseXml(await r.text());
}

// Strategy 4: corsproxy.org
async function fetchViaCorsproxyOrg(rssUrl) {
  const apiUrl = `https://corsproxy.org/?${encodeURIComponent(rssUrl)}`;
  const r = await fetch(apiUrl, { signal: AbortSignal.timeout(12000) });
  if (!r.ok) throw new Error(`corsproxy.org: ${r.status}`);
  return parseXml(await r.text());
}

// Try all strategies in order
async function fetchRss(rssUrl) {
  const strategies = [fetchViaAllOrigins, fetchViaCorsproxy, fetchViaCorsproxyOrg, fetchViaRss2Json];
  for (const fn of strategies) {
    try {
      const articles = await fn(rssUrl);
      if (articles.length > 0) return articles;
    } catch (e) {
      errorLogs.push(`[${fn.name}] ${rssUrl.slice(0,80)}... → ${e.message}`);
    }
  }
  return [];
}

// ═══════════ XML PARSER ═══════════
function parseXml(xml) {
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  const err = doc.querySelector('parsererror');
  if (err) throw new Error('XML parse error');
  const out = [];
  doc.querySelectorAll('item').forEach(it => {
    const title = it.querySelector('title')?.textContent?.trim() || '';
    const link = it.querySelector('link')?.textContent?.trim() || '';
    const sourceUrl = it.querySelector('source')?.getAttribute('url') || '';
    const actualLink = (sourceUrl && !sourceUrl.includes('news.google.com')) ? sourceUrl : link;
    const pub = it.querySelector('pubDate')?.textContent || '';
    const src = it.querySelector('source')?.textContent?.trim() || '';
    const desc = it.querySelector('description')?.textContent || '';
    let img = extractImg(desc);
    if (!img) { const mc = it.getElementsByTagNameNS('*','content'); if (mc.length) img = mc[0].getAttribute('url')||''; }
    if (!img) { const enc = it.querySelector('enclosure'); if (enc) img = enc.getAttribute('url')||''; }
    const summary = stripHtml(desc);
    if (title && actualLink) out.push({ title, link: actualLink, pubDate: new Date(pub), source: src || extractSource(title), img, summary });
  });
  return out;
}

function extractImg(html) { const m = html.match(/<img[^>]+src=["']([^"']+)["']/i); return m ? m[1] : ''; }
function extractSource(title) { const m = title.match(/[-–—]\s*([^-–—]+)$/); return m ? m[1].trim() : ''; }
function stripHtml(html) {
  let t = html.replace(/<[^>]+>/g, '').trim();
  if (t.length > 280) t = t.slice(0,280)+'...';
  return t;
}

// Google News links redirect â resolve to the actual article URL first
async function resolveGoogleNewsUrl(url) {
  if (!url.includes('news.google.com')) return url;
  // Worker経由でURL解決（設定されている場合）
  if (WORKER_URL) {
    try {
      const r = await fetch(WORKER_URL + '/resolve?url=' + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
      if (r.ok) {
        const d = await r.json();
        if (d.resolved && !d.resolved.includes('news.google.com')) return d.resolved;
      }
    } catch(e) {}
  }
  // Try to extract the real URL from Google News redirect
  // Method 1: Use allorigins to follow the redirect and get the final URL
  try {
    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, { signal: AbortSignal.timeout(10000) });
    if (r.ok) {
      const d = await r.json();
      // allorigins returns the final URL after redirects in response_url
      if (d.status?.url && !d.status.url.includes('news.google.com')) return d.status.url;
      // Try to extract URL from the HTML content (Google News redirect page)
      if (d.contents) {
        const m = d.contents.match(/data-n-au="([^"]+)"/);
        if (m) return decodeURIComponent(m[1]);
        const m2 = d.contents.match(/href="(https?:\/\/(?!news\.google\.com)[^"]+)"/);
        if (m2) return m2[1];
        // If content is from the actual article (redirect was followed), return as-is
        if (d.contents.length > 1000) return url;
      }
    }
  } catch(e) {}
  // Method 2: Try corsproxy which may follow redirects
  try {
    const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`, {
      signal: AbortSignal.timeout(10000),
      redirect: 'follow'
    });
    if (r.ok && r.url && !r.url.includes('news.google.com') && !r.url.includes('corsproxy')) return r.url;
  } catch(e) {}
  return url;
}

async function fetchViaProxy(proxyFn, url) {
  const html = await proxyFn(url);
  if (html && html.length > 200) return html;
  throw new Error('too short');
}

async function fetchArticleBody(url) {
  // Worker経由でHTML取得（設定されている場合）
  if (WORKER_URL) {
    try {
      const r = await fetch(WORKER_URL + '/fetch?url=' + encodeURIComponent(url), { signal: AbortSignal.timeout(15000) });
      if (r.ok) {
        const html = await r.text();
        if (html && html.length > 200) return html;
      }
    } catch(e) {}
  }
  // First, try to resolve Google News redirect URLs
  let resolvedUrl = url;
  try { resolvedUrl = await resolveGoogleNewsUrl(url); } catch(e) {}

  const proxies = [
    // allorigins â JSON response, generally reliable
    async (u) => {
      const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`, { signal: AbortSignal.timeout(15000) });
      if (!r.ok) throw new Error('fail');
      const d = await r.json();
      return d.contents || '';
    },
    // corsproxy.io
    async (u) => {
      const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(u)}`, { signal: AbortSignal.timeout(15000) });
      if (!r.ok) throw new Error('fail');
      return await r.text();
    },
    // corsproxy.org
    async (u) => {
      const r = await fetch(`https://corsproxy.org/?${encodeURIComponent(u)}`, { signal: AbortSignal.timeout(15000) });
      if (!r.ok) throw new Error('fail');
      return await r.text();
    },
    // api.codetabs.com â another free proxy
    async (u) => {
      const r = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`, { signal: AbortSignal.timeout(15000) });
      if (!r.ok) throw new Error('fail');
      return await r.text();
    },
    // Google webcache as last resort
    async (u) => {
      const cacheUrl = `https://webcache.googleusercontent.com/search?q=cache:${encodeURIComponent(u)}`;
      const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(cacheUrl)}`, { signal: AbortSignal.timeout(15000) });
      if (!r.ok) throw new Error('fail');
      const d = await r.json();
      return d.contents || '';
    }
  ];

  // Try with the resolved URL first, then original URL as fallback
  const urlsToTry = resolvedUrl !== url ? [resolvedUrl, url] : [url];

  for (const tryUrl of urlsToTry) {
    for (const fn of proxies) {
      try {
        const html = await fn(tryUrl);
        if (html && html.length > 200) return html;
      } catch(e) { continue; }
    }
  }
  return null;
}
function extractArticleContent(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');

  // Remove unwanted elements
  doc.querySelectorAll('script,style,nav,header,footer,aside,.ad,.ads,.sidebar,.menu,.nav,.comment,.related,.share,.social,iframe,form').forEach(e => e.remove());

  // Try to find article content in priority order
  const selectors = ['article', '[role="article"]', 'main', '.article-body', '.article-content', '.entry-content', '.post-content', '.story-body', '.content-body', '#article-body', '.article__body'];
  let contentEl = null;
  for (const sel of selectors) {
    contentEl = doc.querySelector(sel);
    if (contentEl) break;
  }
  if (!contentEl) contentEl = doc.body;

  // Extract paragraphs
  const paragraphs = [];
  contentEl.querySelectorAll('p').forEach(p => {
    const text = p.textContent.trim();
    // Filter out short/junk paragraphs
    if (text.length > 20 && !text.match(/^(広告|PR|スポンサー|cookie|Copyright|©)/i)) {
      paragraphs.push(text);
    }
  });

  // Also try to get meta description as fallback summary
  let metaDesc = '';
  const metaEl = doc.querySelector('meta[name="description"],meta[property="og:description"]');
  if (metaEl) metaDesc = metaEl.getAttribute('content') || '';

  // Try to get og:image
  let ogImg = '';
  const ogImgEl = doc.querySelector('meta[property="og:image"],meta[name="twitter:image"]');
  if (ogImgEl) ogImg = ogImgEl.getAttribute('content') || '';

  return { paragraphs, metaDesc, ogImg };
}
function dedup(arr) {
  const s = new Set();
  return arr.filter(a => { const k = a.title.replace(/\s+/g,'').toLowerCase().slice(0,50); if (s.has(k)) return false; s.add(k); return true; });
}

function gurl(query, lang) {
  const hl = lang==='ja'?'ja':'en', gl = lang==='ja'?'JP':'US', ce = lang==='ja'?'JP:ja':'US:en';
  return `https://news.google.com/rss/search?q=${encodeURIComponent(query+' when:30d')}&hl=${hl}&gl=${gl}&ceid=${ce}`;
}

async function fetchCat(ck) {
  const qs = CAT_Q[ck]; const ps = [];
  for (const lang of ['ja','en']) {
    for (const q of qs[lang]) {
      ps.push(fetchRss(gurl(q, lang)).then(arts => {
        arts.forEach(a => { a.category=ck; a.lang=lang; });
        return arts;
      }));
    }
  }
  const res = await Promise.all(ps);
  const all = res.flat().sort((a,b) => b.pubDate - a.pubDate);
  return dedup(all).slice(0, 20);
}

async function tr(text) {

    if (d?.[0]) return d[0].map(s=>s[0]).join('');
  } catch(e) { errorLogs.push(`[translate] ${e.message}`); }
  return null;
}

  const en = ALL.filter(a => a.lang==='en');

  let done = 0;

      const tt = await tr(a.title);
      if (tt) { a.titleOriginal=a.title; a.title=tt; }
      if (a.summary?.length > 10) {
        const ts = await tr(a.summary);

          a.summaryOriginal=a.summary; a.summary=ts;

          a.summaryShort = ts.length > 60 ? ts.slice(0,55)+'...' : ts;

      done++;

    }));
  }

  render();
}

// SF Owner matching
var _sfOwners={},_sfKeys=[],_sfOwnerNames=[];
function splitSfKey(key){
  var parts=[];
  // Split on brackets
  var segs=key.replace(/[\[\]\(\)\uff08\uff09\u3010\u3011\u300c\u300d]/g,"\t").split("\t");
  for(var s=0;s<segs.length;s++){
    var seg=segs[s].trim();
    if(seg.length<2)continue;
    parts.push(seg);
    // Split CJK vs Latin runs within each segment
    var cjk=seg.match(/[\u3000-\u9fff\uff00-\uffef]+/g);
    if(cjk)for(var c=0;c<cjk.length;c++){if(cjk[c].length>=2)parts.push(cjk[c]);}
    var lat=seg.match(/[a-zA-Z][a-zA-Z0-9\s&\-\.]+[a-zA-Z0-9]/g);
    if(lat)for(var l=0;l<lat.length;l++){if(lat[l].trim().length>=4)parts.push(lat[l].trim());}
  }
  // Also split on delimiters
  var delims=["\uff5c","|","/","\uff0f","\u30fb","\u3000","  "," - "];
  for(var d=0;d<delims.length;d++){
    if(key.indexOf(delims[d])>=0){
      var dp=key.split(delims[d]);
      for(var di=0;di<dp.length;di++){var dd=dp[di].trim();if(dd.length>=2)parts.push(dd);}
    }
  }
  // Deduplicate and filter
  var stop={co:1,ltd:1,inc:1,the:1,and:1,for:1,japan:1,tokyo:1,llc:1,gk:1,kk:1,corporation:1,company:1,group:1};
  var seen={},result=[];
  for(var p=0;p<parts.length;p++){
    var v=parts[p].toLowerCase().trim();
    if(seen[v])continue;
    var hasCjk=/[\u3000-\u9fff]/.test(v);
    if(hasCjk&&v.length>=2){seen[v]=1;result.push(v);}
    else if(!hasCjk&&v.length>=4&&!stop[v]){seen[v]=1;result.push(v);}
  }
  return result;
}
function loadSfOwners(){
  fetch("data/sf_owners.tsv").then(function(r){return r.text();}).then(function(text){
    var lines=text.trim().split("\n");
    _sfOwnerNames=lines[0].split("\t");
    var seen={};
    for(var i=1;i<lines.length;i++){
      var p=lines[i].split("\t");
      if(p.length<2)continue;
      var oid=parseInt(p[1]);
      var keys=splitSfKey(p[0]);
      for(var j=0;j<keys.length;j++){
        if(!seen[keys[j]]){seen[keys[j]]=1;_sfOwners[keys[j]]=oid;_sfKeys.push(keys[j]);}
      }
    }
    _sfKeys.sort(function(a,b){return b.length-a.length;});
    console.log("SF owners loaded:",_sfKeys.length,"keys from",lines.length-1,"accounts");
    if(typeof render==="function") render();
  });
}
function findSfOwner(title){
  var t=(title||"").toLowerCase();
  for(var i=0;i<_sfKeys.length;i++){if(t.indexOf(_sfKeys[i])>=0)return{name:_sfOwnerNames[_sfOwners[_sfKeys[i]]],key:_sfKeys[i]};}
  return null;
}
function sfOwnerBadge(title){
  var o=findSfOwner(title);

  return '\x3cspan class="sf-owner-tag"\x3e' + esc(o.name) + '\x3c/span\x3e';
}

function render() {

    return;
  }

  let list = TAB==='top' ? getTop() : TAB==='all' ? ALL : ALL.filter(a=>a.category===TAB);
  if (q) list = list.filter(a =>
    a.title.toLowerCase().includes(q)||a.source.toLowerCase().includes(q)||
    (a.summary||'').toLowerCase().includes(q)||(a.titleOriginal||'').toLowerCase().includes(q));

      if (!g[ck]?.length) continue;

}

function sw(t, el) {
  TAB = t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ═══════════ DETAIL ═══════════
function openDetail(id) {
  const a = findArticle(id);
  if (!a) { console.warn('Article not found:', id); return; }
  currentArticle = a;
  const d = a.pubDate instanceof Date ? a.pubDate : new Date(a.pubDate);
  const cat = CATS[a.category];
  const bm = isBm(a.id);

  let imgH;
  if (a.img) {
    imgH = `<img class="detail-img" src="${esc(a.img)}" alt="" referrerpolicy="no-referrer"
      onerror="this.style.display='none'">`;
  } else {
    imgH = `<div class="detail-img-ph" style="background:${cat?.color||'#888'}">${cat?.label||''}</div>`;
  }
  const origT = a.titleOriginal ? `<div class="detail-orig">${esc(a.titleOriginal)}</div>` : '';
  const langN = a.lang==='en' ? '<span class="lang-tag lten" style="font-size:11px;padding:2px 8px;">翻訳記事 (EN→JP)</span>' : '';
  const summaryText = a.summaryFull || a.summary || '';
  const summaryBox = summaryText ? `
    <div class="detail-summary-box">
      <div class="label">要約</div>
      <p>${esc(summaryText)}</p>
    </div>` : '';

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-cat" style="color:${cat?.color||'#0052ff'}">${cat?.label||''} ${langN}</div>
    <div class="detail-title">${esc(a.title)}</div>
    ${origT}
    <div class="detail-meta">
      <strong>${esc(a.source)}</strong>
      <span class="mdot"></span>
      <span>${fmtD(d)} (${fmtAgo(d)})</span>
    </div>
    ${imgH}
    <div class="detail-img-credit">出典: ${esc(a.source)}</div>
    ${summaryBox}
    <div id="detailArticleArea">
      <div class="detail-article-loading"><span class="mspin"></span> 記事本文を取得中...</div>
    </div>
    <a class="detail-read-full" href="${esc(a.link)}" target="_blank" rel="noopener noreferrer" style="margin-top:20px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      元記事を読む (${esc(a.source)})
    </a>
    <div class="detail-footer">
      <button class="${bm?'saved-d':''}" data-bmid="${esc(a.id)}" onclick="toggleBmDetail(this.dataset.bmid)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="${bm?'currentColor':'none'}" stroke="currentColor" stroke-width="1.8"><path d="M5 3a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v18l-7-4-7 4V3z"/></svg>
        ${bm?'保存済み':'記事を保存'}
      </button>
    </div>`;

  document.getElementById('detailView').classList.add('open');
  document.getElementById('detailView').scrollTop = 0;
  document.body.style.overflow = 'hidden';

  // Fetch article body in background
  loadArticleBody(a);
}

async function loadArticleBody(article) {
  const area = document.getElementById('detailArticleArea');
  if (!area) return;

  try {
    const html = await fetchArticleBody(article.link);
    if (!html) {
      area.innerHTML = `<div style="color:#888;font-size:14px;padding:12px 0;border-top:1px solid #eee;">
        記事本文を直接取得できませんでした。上の「元記事を読む」ボタンからご覧ください。</div>`;
      return;
    }

    const { paragraphs, metaDesc, ogImg } = extractArticleContent(html);

    // Update image if we got a better one from og:image
    if (ogImg && !article.img) {
      article.img = ogImg;
      const imgEl = document.querySelector('.detail-img');
      if (imgEl) imgEl.src = ogImg;
    }

    // Update summary if we got meta description and current summary is weak
    if (metaDesc && (!article.summary || article.summary.length < 30)) {
      article.summary = metaDesc;
      // Also update the summary box
      const sumBox = document.querySelector('.detail-summary-box p');
      if (sumBox) sumBox.textContent = metaDesc;
    }

    if (paragraphs.length > 0) {
      // Show article text (limit to reasonable length)
      const displayParas = paragraphs.slice(0, 20);
      let bodyHtml = '<div class="detail-article-text">';
      bodyHtml += displayParas.map(p => `<p>${esc(p)}</p>`).join('');
      if (paragraphs.length > 20) {
        bodyHtml += `<p style="color:#888;">（以下省略 — 元記事で全文をお読みいただけます）</p>`;
      }
      bodyHtml += '</div>';
      area.innerHTML = bodyHtml;

      // If article is in English, translate the body
      if (article.lang === 'en' && displayParas.length > 0) {
        translateArticleBody(displayParas, area);
      }
    } else {
      area.innerHTML = `<div style="color:#888;font-size:14px;padding:12px 0;border-top:1px solid #eee;">
        記事本文の抽出に失敗しました。上の「元記事を読む」ボタンからご覧ください。</div>`;
    }
  } catch(e) {
    area.innerHTML = `<div style="color:#888;font-size:14px;padding:12px 0;">
      記事本文を取得できませんでした。上の「元記事を読む」ボタンからご覧ください。</div>`;
  }
}

async function translateArticleBody(paragraphs, area) {
  // Translate paragraphs in batches
  const translated = [];
  for (let i = 0; i < paragraphs.length; i += 3) {
    const batch = paragraphs.slice(i, i+3);
    const results = await Promise.all(batch.map(p => tr(p)));
    results.forEach((t, j) => translated.push(t || paragraphs[i+j]));
  }
  let bodyHtml = '<div class="detail-article-text">';
  bodyHtml += translated.map(p => `<p>${esc(p)}</p>`).join('');
  bodyHtml += '</div>';
  area.innerHTML = bodyHtml;
}

function closeDetail() {
  document.getElementById('detailView').classList.remove('open');
  document.body.style.overflow = '';
  currentArticle = null;
}

function toggleBmDetail(id) { toggleBm(id); if (currentArticle) openDetail(currentArticle.id); }

// ═══════════ BOOKMARKS ═══════════
function toggleBm(id, ev) {
  if (ev) { ev.stopPropagation(); ev.preventDefault(); }
  const idx = BM.findIndex(b=>b.id===id);
  if (idx>=0) { BM.splice(idx,1); }
  else {
    const a = ALL.find(x=>x.id===id);
    if (a) BM.unshift({ id:a.id, title:a.title, titleOriginal:a.titleOriginal||'', link:a.link, source:a.source, pubDate:(a.pubDate instanceof Date ? a.pubDate.toISOString() : (a.pubDate || new Date().toISOString())), img:a.img, summary:a.summary, category:a.category, lang:a.lang, summaryOriginal:a.summaryOriginal||'' });
  }
  saveBm(); render(); renderDrawer();
}

// Find article by id — works for both ALL array and BM array
function findArticle(id) {
  return ALL.find(x=>x.id===id) || BM.find(x=>x.id===id);
}
function saveBm() { localStorage.setItem('dn_bm2',JSON.stringify(BM)); updateBmBadge(); }
function updateBmBadge() {
  const b = document.getElementById('bmBadge');
  b.textContent = BM.length; b.classList.toggle('show', BM.length>0);
}
function openDrawer() { document.getElementById('drawerBg').classList.add('open'); renderDrawer(); }
function closeDrawer() { document.getElementById('drawerBg').classList.remove('open'); }
function closeDrawerBg(e) { if (e.target===e.currentTarget) closeDrawer(); }
function renderDrawer() {
  const l=document.getElementById('drawerList'), f=document.getElementById('drawerFt');
  if (!BM.length) { l.innerHTML='<div class="drawer-empty">保存した記事はありません。</div>'; f.style.display='none'; return; }
  f.style.display='block';
  l.innerHTML = BM.map(b=>rowH({...b,pubDate:new Date(b.pubDate)},false)).join('');
}
function clearBm() { if (!confirm('保存した記事をすべて削除しますか？')) return; BM=[]; saveBm(); renderDrawer(); render(); }

// ═══════════ KEYBOARD ═══════════
document.addEventListener('keydown', e => { if (e.key==='Escape') closeDetail(); });

// ═══════════ INIT ═══════════
updateBmBadge();
setInterval(loadAllFeeds, 30*60*1000);
loadAllFeeds();
loadSfOwners();
</script>

name: Add filter
on: workflow_dispatch
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          cat > p.js << 'END'
          const fs=require('fs');
          let c=fs.readFileSync('resolve-news.mjs','utf8');
          let f='// --- Non-relevant article filter ---\n'
            +'const EXCLUDE_PATTERNS = [\n'
            +'  /\\bRBW\\b/i,/\\bHYBE\\b/i,/Kstyle/i,/K-POP/i,/KPOP/i,\n'
            +'  /\\bSM\\s*Entertainment/i,/\\bYG\\s*Entertainment/i,/\\bJYP/i,\n'
            +'  /WoW!Korea/i,/KOREA WAVE/i,\n'
            +'];\n\n'
            +'function isRelevantArticle(title,source){\n'
            +'  const text=title+\' \'+(source||\'\');\n'
            +'  return !EXCLUDE_PATTERNS.some(p=>p.test(text));\n'
            +'}\n\n';
          c=c.replace('// --- HTML',f+'// --- HTML');
          c=c.replace(/(seen\.add\(a\.link\);)\s*(return true;)/,
            '$1\n    if(!isRelevantArticle(a.title,a.source)){\n      console.log(\'  Excluded: \'+a.title.substring(0,60));\n      return false;\n    }\n    $2');
          fs.writeFileSync('resolve-news.mjs',c);
          console.log('OK');
          END
          node p.js
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resolve-news.mjs
          git commit -m "Add non-relevant article filter"
          git push

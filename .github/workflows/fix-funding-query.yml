name: Fix funding query
on: workflow_dispatch
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix funding_p query
        run: |
          cat > fix.js << 'ENDSCRIPT'
          import { readFileSync, writeFileSync } from 'fs';
          let code = readFileSync('resolve-news.mjs', 'utf-8');
          const oldUrl = "site%3Athebridge.jp+OR+site%3Aprtimes.jp+%E8%B3%87%E9%87%91%E8%AA%BF%E9%81%94+OR+%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%88%E3%82%A2%E3%83%83%E3%83%97+OR+%E3%82%B7%E3%83%AA%E3%83%BC%E3%82%BA&";
          const newUrl = "site%3Athebridge.jp+OR+site%3Aprtimes.jp+%E8%B3%87%E9%87%91%E8%AA%BF%E9%81%94+OR+%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%88%E3%82%A2%E3%83%83%E3%83%97+OR+%E3%82%B7%E3%83%AA%E3%83%BC%E3%82%BAA+OR+%E3%82%B7%E3%83%AA%E3%83%BC%E3%82%BAB+OR+%E3%82%B7%E3%83%AA%E3%83%BC%E3%82%BAC&";
          if (!code.includes(oldUrl)) {
            console.error('ERROR: Could not find the old funding_p URL pattern');
            process.exit(1);
          }
          code = code.replace(oldUrl, newUrl);
          writeFileSync('resolve-news.mjs', code);
          console.log('Fixed funding_p: シリーズ -> シリーズA OR シリーズB OR シリーズC');
          ENDSCRIPT
          node --input-type=module fix.js
      - name: Verify fix
        run: |
          grep -o 'funding_p.*ceid=JP:ja' resolve-news.mjs | head -1
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resolve-news.mjs
          git diff --cached --stat
          git commit -m "fix: narrow funding_p query - replace broad シリーズ with シリーズA/B/C"
          git push

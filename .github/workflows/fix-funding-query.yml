name: Fix funding query
on: workflow_dispatch
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix funding_p query with sed
        run: |
          echo "Before:"
          grep 'funding_p' resolve-news.mjs
          sed -i 's/%E3%82%B7%E3%83%AA%E3%83%BC%E3%82%BA&/%E3%82%B7%E3%83%AA%E3%83%BC%E3%82%BAA+OR+%E3%82%B7%E3%83%AA%E3%83%BC%E3%82%BAB+OR+%E3%82%B7%E3%83%AA%E3%83%BC%E3%82%BAC\&/' resolve-news.mjs
          echo "After:"
          grep 'funding_p' resolve-news.mjs
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resolve-news.mjs
          git diff --cached --stat
          git commit -m "fix: narrow funding_p query - replace broad シリーズ with シリーズA/B/C"
          git push

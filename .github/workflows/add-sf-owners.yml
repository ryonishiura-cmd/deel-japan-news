name: Add SF owner matching
on: workflow_dispatch
jobs:
  add-sf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create sf_owners.tsv from embedded data
        run: |
          python3 << 'PYEND'
          import gzip, base64
          B64=""
          data = gzip.decompress(base64.b64decode(B64))
          with open('data/sf_owners.tsv', 'wb') as f:
              f.write(data)
          lines = data.decode('utf-8').strip().split('\n')
          print(f"Created sf_owners.tsv: {len(lines)} lines, {len(data)} bytes")
          PYEND

      - name: Patch index.html with SF owner matching
        run: |
          python3 << 'PYEND'
          with open('index.html', 'r') as f:
              html = f.read()

          # 1) Add CSS for owner tag - insert before </style>
          css_patch = """
          .sf-owner-tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:.72rem;font-weight:600;margin-left:6px;vertical-align:middle;color:#fff;background:#6366f1}
          """
          html = html.replace('</style>', css_patch + '</style>')

          # 2) Add SF owner matching JS - insert before // INIT comment
          js_patch = """
          // âââââââââââ SF OWNER MATCHING âââââââââââ
          let _sfOwners = null; // {key: ownerName}
          let _sfKeys = [];     // sorted longest first

          async function loadSfOwners() {
            try {
              const resp = await fetch('data/sf_owners.tsv');
              if (!resp.ok) return;
              const text = await resp.text();
              const lines = text.trim().split('\\n');
              const names = lines[0].split('\\t');
              _sfOwners = {};
              for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].split('\\t');
                if (parts.length >= 2) {
                  _sfOwners[parts[0]] = names[parseInt(parts[1])] || '';
                }
              }
              _sfKeys = Object.keys(_sfOwners).sort((a, b) => b.length - a.length);
              console.log('SF owners loaded:', _sfKeys.length, 'keys');
            } catch(e) { console.warn('SF owners not available:', e); }
          }

          function findSfOwner(title) {
            if (!_sfOwners || !title) return null;
            const t = title.toLowerCase();
            for (const key of _sfKeys) {
              if (key.length >= 2 && t.includes(key)) {
                return _sfOwners[key];
              }
            }
            return null;
          }

          // Monkey-patch rowH to add owner badge
          const _origRowH = rowH;
          rowH = function(a, showScore) {
            let html = _origRowH(a, showScore);
            const owner = findSfOwner(a.title) || findSfOwner(a.titleOriginal);
            if (owner) {
              const badge = '<span class="sf-owner-tag">' + esc(owner) + '</span>';
              html = html.replace('</span>\\n          <span class="mdot">', badge + '</span>\\n          <span class="mdot">');
            }
            return html;
          };

          loadSfOwners();
          """
          html = html.replace('// âââââââââââ INIT âââââââââââ', js_patch + '\n// âââââââââââ INIT âââââââââââ')

          with open('index.html', 'w') as f:
              f.write(html)
          print("index.html patched with SF owner matching")
          PYEND

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sf_owners.tsv index.html
          git diff --cached --stat
          git commit -m "feat: add Salesforce owner matching to news dashboard

          - Add data/sf_owners.tsv with 1041 Japanese company names mapped to owners
          - Patch index.html with owner matching logic and purple badge display
          - Matches article titles against Salesforce account names
          - Shows account owner name next to matched articles"
          git push
